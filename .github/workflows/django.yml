name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Django Tests (MySQL)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: store_db
          MYSQL_USER: store_db
          MYSQL_PASSWORD: store_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (MySQL client)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential

      - name: Install Python dependencies
        working-directory: storeMS
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent; do
            echo "Waiting for MySQL..."
            sleep 3
          done

      - name: Run migrations
        env:
          DB_NAME: store_db
          DB_USER: store_db
          DB_PASSWORD: store_db
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          python manage.py migrate

      - name: Run tests
        env:
          DB_NAME: store_db
          DB_USER: store_db
          DB_PASSWORD: store_db
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          pytest -q